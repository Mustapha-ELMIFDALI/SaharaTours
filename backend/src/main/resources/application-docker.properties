server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/saharatours_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
