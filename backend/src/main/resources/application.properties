# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── MySQL ────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/saharatours_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ──────────────────────────────────────────────────────────────────────
# Secret key (base64) — must be ≥ 256 bits for HS256
jwt.secret=c2FoYXJhdG91cnMtc2VjcmV0LWtleS1mb3Itand0LWF1dGhlbnRpY2F0aW9uLTIwMjQ=
# Expiration : 7 jours (604800000 ms)
jwt.expiration=604800000

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.ma.saharatours=INFO
